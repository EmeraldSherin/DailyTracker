<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Category View</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        [data-theme="dark"] {
            --bg:          #0f1117;
            --surface:     #1a1e2e;
            --surface2:    #222840;
            --border:      #2c3350;
            --border-h:    #4a5280;
            --accent:      #5b6af0;
            --accent-soft: rgba(91,106,240,0.13);
            --green:       #1fca96;
            --green-soft:  rgba(31,202,150,0.11);
            --yellow:      #f0b429;
            --blue:        #4da6ff;
            --text:        #dde2f0;
            --text2:       #a0aac8;
            --muted:       #5a6380;
            --shadow:      0 2px 18px rgba(0,0,0,0.45);
        }

        [data-theme="light"] {
            --bg:          #eef0f7;
            --surface:     #ffffff;
            --surface2:    #f4f5fb;
            --border:      #dde1ef;
            --border-h:    #9aa0c0;
            --accent:      #4a58e0;
            --accent-soft: rgba(74,88,224,0.07);
            --green:       #0ea876;
            --green-soft:  rgba(14,168,118,0.08);
            --yellow:      #c8870a;
            --blue:        #2680d4;
            --text:        #1c2038;
            --text2:       #4a527a;
            --muted:       #8890aa;
            --shadow:      0 2px 12px rgba(0,0,0,0.07);
        }

        html { transition: background 0.25s; }

        body {
            font-family: 'Source Sans 3', 'Calibri', 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 200;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 32px; height: 56px; gap: 2px;
            box-shadow: var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }

        .brand {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-weight: 700; font-size: 21px;
            color: var(--accent); margin-right: auto;
            text-decoration: none;
            display: flex; align-items: center; gap: 9px;
        }

        .brand-icon {
            width: 30px; height: 30px;
            background: var(--accent); border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: #fff; font-family: inherit;
        }

        .nav-link {
            text-decoration: none; color: var(--text2);
            font-size: 14px; font-weight: 500;
            padding: 6px 13px; border-radius: 7px;
            transition: all 0.18s;
        }

        .nav-link:hover { color: var(--text); background: var(--surface2); }
        .nav-study    { color: var(--green) !important; }
        .nav-habit    { color: var(--blue) !important; }
        .nav-analytics{ color: var(--yellow) !important; }

        /* THEME TOGGLE */
        .theme-toggle {
            margin-left: 14px; background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 3px;
            display: flex; gap: 2px;
        }

        .t-btn {
            background: none; border: none;
            padding: 5px 13px; border-radius: 18px;
            cursor: pointer; font-size: 12.5px; font-weight: 600;
            color: var(--muted); font-family: inherit;
            transition: all 0.2s;
        }

        .t-btn.on {
            background: var(--surface); color: var(--text);
            box-shadow: 0 1px 5px rgba(0,0,0,0.18);
        }

        /* MAIN */
        main { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

        .page-title {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 28px; font-weight: 700;
            color: var(--text); margin-bottom: 26px;
        }

        /* HABIT CARD */
        .habit-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 26px;
            margin-bottom: 18px; box-shadow: var(--shadow);
            transition: border-color 0.2s, background 0.25s;
        }

        .habit-card:hover { border-color: var(--border-h); }

        .habit-card h3 {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 20px; font-weight: 700;
            color: var(--text); margin-bottom: 18px;
        }

        /* STATS ROW */
        .stats-row {
            display: flex; gap: 12px; flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .mini-stat {
            flex: 1; min-width: 110px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 16px;
            transition: background 0.25s;
        }

        .ms-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--muted); margin-bottom: 6px;
        }

        .ms-value {
            font-family: 'Crimson Pro', 'Times New Roman', serif;
            font-size: 26px; font-weight: 700; color: var(--text);
        }

        /* DIVIDER */
        .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

        /* SUB LABEL */
        .sub-label {
            font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--muted); margin-bottom: 12px;
        }

        /* FORMS */
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        .form-row input[type="number"],
        .form-row input[type="text"] {
            flex: 1; min-width: 130px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 9px 13px; border-radius: 8px;
            font-family: 'Source Sans 3', 'Calibri', sans-serif;
            font-size: 14px; outline: none;
            transition: border-color 0.18s, background 0.25s;
        }

        .form-row input::placeholder { color: var(--muted); }
        .form-row input:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent); color: #fff; border: none;
            padding: 9px 18px; border-radius: 8px;
            font-family: 'Source Sans 3', 'Calibri', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.18s, transform 0.1s; white-space: nowrap;
        }

        .btn:hover { opacity: 0.87; }
        .btn:active { transform: scale(0.97); }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

        /* ACHIEVED */
        .achieved-badge {
            display: inline-flex; align-items: center; gap: 7px;
            background: var(--green-soft);
            border: 1px solid rgba(31,202,150,0.28);
            color: var(--green); font-size: 13.5px; font-weight: 600;
            padding: 8px 16px; border-radius: 30px; margin-top: 14px;
        }

        /* NOTES */
        .notes-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }

        .notes-list li {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 7px; padding: 8px 14px 8px 30px;
            font-size: 14px; color: var(--text2);
            position: relative;
            transition: background 0.25s;
        }

        .notes-list li::before {
            content: '›'; position: absolute; left: 12px;
            color: var(--accent); font-size: 17px; line-height: 1.3;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="brand">
        <span class="brand-icon">G</span>
        GrowIt
    </a>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/category/STUDY" class="nav-link nav-study">Study</a>
    <a href="/category/HABIT" class="nav-link nav-habit">Habits</a>
    <a href="/analytics" class="nav-link nav-analytics">Analytics</a>
    <a href="/notes" class="nav-link nav-notes" id="nav-notes">Notes</a>

    <div class="theme-toggle">
        <button class="t-btn" id="btn-light" onclick="setTheme('light')">☀ Light</button>
        <button class="t-btn on"  id="btn-dark"  onclick="setTheme('dark')">◑ Dark</button>
    </div>
</nav>

<main>

    <h1 class="page-title" th:text="${categoryName} + ' Tasks'"></h1>

    <div th:each="habit : ${habits}" class="habit-card">

        <h3 th:text="${habit.title}"></h3>

        <!-- STATS -->
        <div class="stats-row">
            <div class="mini-stat">
                <div class="ms-label">Daily Target</div>
                <div class="ms-value" th:text="${habit.dailyTarget}"></div>
            </div>
            <div class="mini-stat">
                <div class="ms-label">Today Actual</div>
                <div class="ms-value" th:text="${habit.todayActual}"></div>
            </div>
            <div class="mini-stat">
                <div class="ms-label">Total Completed</div>
                <div class="ms-value" th:text="${habit.totalActual}"></div>
            </div>
        </div>

        <hr class="divider"/>

        <!-- SET TARGET -->
        <div class="sub-label">Set Daily Target</div>
        <form th:action="@{/set-target}" method="post">
            <input type="hidden" name="id" th:value="${habit.id}" />
            <input type="hidden" name="category" th:value="${habit.category}" />
            <div class="form-row">
                <input type="number" name="target" placeholder="Enter target number…" required />
                <button type="submit" class="btn btn-ghost">Set Target</button>
            </div>
        </form>

        <hr class="divider"/>

        <!-- UPDATE PROGRESS -->
        <div class="sub-label">Log Progress</div>
        <form th:action="@{/update-progress}" method="post">
            <input type="hidden" name="id" th:value="${habit.id}" />
            <input type="hidden" name="category" th:value="${habit.category}" />
            <div class="form-row">
                <input type="number" name="count" placeholder="Count today…" required />
                <input type="text"   name="note"  placeholder="Problem name (e.g. Merge Two Strings)" />
                <button type="submit" class="btn">Update Progress</button>
            </div>
        </form>

        <!-- ACHIEVED -->
        <div th:if="${habit.targetAchieved}" class="achieved-badge">
            ✅ Target Achieved!
        </div>

        <!-- NOTES -->
        <div th:if="${not #lists.isEmpty(habit.todayNotes)}">
            <hr class="divider"/>
            <div class="sub-label">Problems Solved Today</div>
            <ul class="notes-list">
                <li th:each="note : ${habit.todayNotes}" th:text="${note}"></li>
            </ul>
        </div>

    </div>

</main>

<script>
    (function() {
        const saved = localStorage.getItem('habitos-theme') || 'dark';
        applyTheme(saved);
    })();

    function setTheme(theme) {
        applyTheme(theme);
        localStorage.setItem('habitos-theme', theme);
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('btn-light').classList.toggle('on', theme === 'light');
        document.getElementById('btn-dark').classList.toggle('on',  theme === 'dark');
    }
</script>
</body>
</html>
