<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        [data-theme="dark"] {
            --bg:          #0f1117;
            --surface:     #1a1e2e;
            --surface2:    #222840;
            --border:      #2c3350;
            --border-h:    #4a5280;
            --accent:      #5b6af0;
            --accent-soft: rgba(91,106,240,0.13);
            --green:       #1fca96;
            --green-soft:  rgba(31,202,150,0.11);
            --yellow:      #f0b429;
            --yellow-soft: rgba(240,180,41,0.11);
            --blue:        #4da6ff;
            --blue-soft:   rgba(77,166,255,0.11);
            --text:        #dde2f0;
            --text2:       #a0aac8;
            --muted:       #5a6380;
            --shadow:      0 2px 18px rgba(0,0,0,0.45);
        }

        [data-theme="light"] {
            --bg:          #eef0f7;
            --surface:     #ffffff;
            --surface2:    #f4f5fb;
            --border:      #dde1ef;
            --border-h:    #9aa0c0;
            --accent:      #4a58e0;
            --accent-soft: rgba(74,88,224,0.07);
            --green:       #0ea876;
            --green-soft:  rgba(14,168,118,0.08);
            --yellow:      #c8870a;
            --yellow-soft: rgba(200,135,10,0.08);
            --blue:        #2680d4;
            --blue-soft:   rgba(38,128,212,0.08);
            --text:        #1c2038;
            --text2:       #4a527a;
            --muted:       #8890aa;
            --shadow:      0 2px 12px rgba(0,0,0,0.07);
        }

        html { transition: background 0.25s; }

        body {
            font-family: 'Source Sans 3', 'Calibri', 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 200;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 32px; height: 56px; gap: 2px;
            box-shadow: var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }

        .brand {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-weight: 700; font-size: 21px;
            color: var(--accent); margin-right: auto;
            text-decoration: none;
            display: flex; align-items: center; gap: 9px;
        }

        .brand-icon {
            width: 30px; height: 30px;
            background: var(--accent); border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: #fff; font-family: inherit;
        }

        .nav-link {
            text-decoration: none; color: var(--text2);
            font-size: 14px; font-weight: 500;
            padding: 6px 13px; border-radius: 7px;
            transition: all 0.18s;
        }

        .nav-link:hover { color: var(--text); background: var(--surface2); }
        .nav-link.active { color: var(--text); background: var(--surface2); }
        .nav-study    { color: var(--green) !important; }
        .nav-habit    { color: var(--blue) !important; }
        .nav-analytics{ color: var(--yellow) !important; }

        /* THEME TOGGLE */
        .theme-toggle {
            margin-left: 14px; background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 3px;
            display: flex; gap: 2px;
        }

        .t-btn {
            background: none; border: none;
            padding: 5px 13px; border-radius: 18px;
            cursor: pointer; font-size: 12.5px; font-weight: 600;
            color: var(--muted); font-family: inherit;
            transition: all 0.2s;
        }

        .t-btn.on {
            background: var(--surface); color: var(--text);
            box-shadow: 0 1px 5px rgba(0,0,0,0.18);
        }

        /* MAIN */
        main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

        .page-title {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 28px; font-weight: 700;
            color: var(--text); margin-bottom: 26px;
        }

        /* ANALYTIC CARD */
        .analytic-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 26px;
            margin-bottom: 18px; box-shadow: var(--shadow);
            transition: border-color 0.2s, background 0.25s;
        }

        .analytic-card:hover { border-color: var(--border-h); }

        .analytic-card h3 {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 19px; font-weight: 700;
            color: var(--text); margin-bottom: 20px;
        }

        /* METRICS */
        .metrics-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }

        .metric {
            flex: 1; min-width: 130px;
            border-radius: 11px; padding: 16px 18px;
            border: 1px solid var(--border);
            transition: background 0.25s;
        }

        .metric.streak     { background: var(--yellow-soft); border-color: rgba(240,180,41,0.22); }
        .metric.best       { background: var(--blue-soft);   border-color: rgba(77,166,255,0.22); }
        .metric.consistency{ background: var(--green-soft);  border-color: rgba(31,202,150,0.22); }

        .metric-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--muted); margin-bottom: 8px;
        }

        .metric-value {
            font-family: 'Crimson Pro', 'Times New Roman', serif;
            font-size: 30px; font-weight: 700; line-height: 1;
        }

        .metric.streak      .metric-value { color: var(--yellow); }
        .metric.best        .metric-value { color: var(--blue); }
        .metric.consistency .metric-value { color: var(--green); }

        .metric-unit {
            font-size: 13px; color: var(--muted);
            font-weight: 400; font-family: 'Source Sans 3', sans-serif;
        }

        /* PROGRESS BAR */
        .bar-section { margin-top: 4px; }

        .bar-header {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--muted); margin-bottom: 7px;
        }

        .bar-track {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 30px; height: 9px; overflow: hidden;
        }

        .bar-fill {
            height: 100%; border-radius: 30px;
            background: linear-gradient(90deg, var(--accent), var(--green));
            transition: width 0.7s ease;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="brand">
        <span class="brand-icon">G</span>
        GrowIt
    </a>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/category/STUDY" class="nav-link nav-study">Study</a>
    <a href="/category/HABIT" class="nav-link nav-habit">Habits</a>
    <a href="/analytics" class="nav-link nav-analytics active">Analytics</a>
    <a href="/notes" class="nav-link nav-notes" id="nav-notes">Notes</a>

    <div class="theme-toggle">
        <button class="t-btn" id="btn-light" onclick="setTheme('light')">☀ Light</button>
        <button class="t-btn on"  id="btn-dark"  onclick="setTheme('dark')">◑ Dark</button>
    </div>
</nav>

<main>

    <h1 class="page-title">📈 Analytics</h1>

    <div th:each="habit : ${habits}" class="analytic-card">

        <h3 th:text="${habit.title}"></h3>

        <div class="metrics-row">
            <div class="metric streak">
                <div class="metric-label">Current Streak</div>
                <div class="metric-value">
                    <span th:text="${habit.streak}"></span>
                    <span class="metric-unit">days</span>
                </div>
            </div>
            <div class="metric best">
                <div class="metric-label">Longest Streak</div>
                <div class="metric-value">
                    <span th:text="${habit.longestStreak}"></span>
                    <span class="metric-unit">days</span>
                </div>
            </div>
            <div class="metric consistency">
                <div class="metric-label">Consistency</div>
                <div class="metric-value">
                    <span th:text="${#numbers.formatDecimal(habit.consistency,1,2)}"></span>
                    <span class="metric-unit">%</span>
                </div>
            </div>
        </div>

        <!-- Consistency Bar -->
        <div class="bar-section">
            <div class="bar-header">
                <span>Consistency Rate</span>
                <span th:text="${#numbers.formatDecimal(habit.consistency,1,2)} + '%'"></span>
            </div>
            <div class="bar-track">
                <div class="bar-fill"
                     th:style="'width: ' + ${#numbers.formatDecimal(habit.consistency,1,2)} + '%'">
                </div>
            </div>
        </div>

    </div>

</main>

<script>
    (function() {
        const saved = localStorage.getItem('habitos-theme') || 'dark';
        applyTheme(saved);
    })();

    function setTheme(theme) {
        applyTheme(theme);
        localStorage.setItem('habitos-theme', theme);
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('btn-light').classList.toggle('on', theme === 'light');
        document.getElementById('btn-dark').classList.toggle('on',  theme === 'dark');
    }
</script>
</body>
</html>
