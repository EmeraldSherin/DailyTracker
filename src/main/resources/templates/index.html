<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Habit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        [data-theme="dark"] {
            --bg:          #0f1117;
            --surface:     #1a1e2e;
            --surface2:    #222840;
            --border:      #2c3350;
            --border-h:    #4a5280;
            --accent:      #5b6af0;
            --accent-soft: rgba(91,106,240,0.13);
            --green:       #1fca96;
            --green-soft:  rgba(31,202,150,0.11);
            --yellow:      #f0b429;
            --blue:        #4da6ff;
            --text:        #dde2f0;
            --text2:       #a0aac8;
            --muted:       #5a6380;
            --shadow:      0 2px 18px rgba(0,0,0,0.45);
        }

        [data-theme="light"] {
            --bg:          #eef0f7;
            --surface:     #ffffff;
            --surface2:    #f4f5fb;
            --border:      #dde1ef;
            --border-h:    #9aa0c0;
            --accent:      #4a58e0;
            --accent-soft: rgba(74,88,224,0.07);
            --green:       #0ea876;
            --green-soft:  rgba(14,168,118,0.08);
            --yellow:      #c8870a;
            --blue:        #2680d4;
            --text:        #1c2038;
            --text2:       #4a527a;
            --muted:       #8890aa;
            --shadow:      0 2px 12px rgba(0,0,0,0.07);
        }

        html { transition: background 0.25s; }

        body {
            font-family: 'Source Sans 3', 'Calibri', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 200;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 32px; height: 56px; gap: 2px;
            box-shadow: var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }

        .brand {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-weight: 700; font-size: 21px;
            color: var(--accent); margin-right: auto;
            text-decoration: none;
            display: flex; align-items: center; gap: 9px;
        }

        .brand-icon {
            width: 30px; height: 30px;
            background: var(--accent); border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: #fff; font-family: inherit;
        }

        .nav-link {
            text-decoration: none; color: var(--text2);
            font-size: 14px; font-weight: 500;
            padding: 6px 13px; border-radius: 7px;
            transition: all 0.18s;
        }

        .nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
        .nav-study    { color: var(--green) !important; }
        .nav-habit    { color: var(--blue) !important; }
        .nav-analytics{ color: var(--yellow) !important; }

        /* THEME TOGGLE */
        .theme-toggle {
            margin-left: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 3px;
            display: flex; gap: 2px;
        }

        .t-btn {
            background: none; border: none;
            padding: 5px 13px; border-radius: 18px;
            cursor: pointer; font-size: 12.5px; font-weight: 600;
            color: var(--muted); font-family: inherit;
            transition: all 0.2s;
        }

        .t-btn.on {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 1px 5px rgba(0,0,0,0.18);
        }

        /* MAIN */
        main { max-width: 1060px; margin: 0 auto; padding: 40px 24px; }

        .page-title {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 30px; font-weight: 700;
            color: var(--text); margin-bottom: 26px;
            letter-spacing: -0.2px;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px; margin-bottom: 22px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 20px 18px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s, transform 0.15s, background 0.25s;
        }

        .stat-card:hover { border-color: var(--border-h); transform: translateY(-2px); }

        .stat-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted); margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Crimson Pro', 'Times New Roman', serif;
            font-size: 36px; font-weight: 700;
            color: var(--accent); line-height: 1;
        }

        .sc-green .stat-value { color: var(--green); }
        .sc-blue  .stat-value { color: var(--blue); }

        /* PANEL */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 24px;
            margin-bottom: 20px; box-shadow: var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }

        .panel-title {
            font-family: 'Crimson Pro', 'Times New Roman', Georgia, serif;
            font-size: 17px; font-weight: 600;
            color: var(--text); margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* FORM */
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

        .form-row input[type="text"],
        .form-row select {
            flex: 1; min-width: 150px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 13px; border-radius: 8px;
            font-family: 'Source Sans 3', 'Calibri', sans-serif;
            font-size: 14px; outline: none;
            transition: border-color 0.18s, background 0.25s;
        }

        .form-row input::placeholder { color: var(--muted); }
        .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
        .form-row select option { background: var(--surface); color: var(--text); }

        .btn {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 20px; border-radius: 8px;
            font-family: 'Source Sans 3', 'Calibri', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.18s, transform 0.1s; white-space: nowrap;
        }

        .btn:hover { opacity: 0.87; }
        .btn:active { transform: scale(0.97); }

        /* TABLE */
        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }

        thead th {
            padding: 10px 13px; text-align: center;
            color: var(--muted); font-size: 11.5px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.07em;
            background: var(--surface2); border-bottom: 1px solid var(--border);
            transition: background 0.25s;
        }

        thead th:first-child { text-align: left; }

        tbody td {
            padding: 10px 13px; text-align: center;
            border-bottom: 1px solid var(--border); color: var(--text);
        }

        tbody td:first-child { text-align: left; font-weight: 500; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--accent-soft); }

        .badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            letter-spacing: 0.04em;
        }

        .badge-study { background: var(--green-soft); color: var(--green); border: 1px solid rgba(31,202,150,0.22); }
        .badge-habit { background: rgba(77,166,255,0.09); color: var(--blue); border: 1px solid rgba(77,166,255,0.22); }

        tbody td a {
            display: inline-flex; align-items: center; justify-content: center;
            width: 27px; height: 27px; border-radius: 6px;
            text-decoration: none; font-size: 13px;
            color: var(--muted); background: var(--surface2);
            border: 1px solid var(--border); transition: all 0.15s;
        }

        tbody td a:hover { border-color: var(--green); color: var(--green); }

        .done-cell a {
            background: var(--green-soft);
            border-color: var(--green);
            color: var(--green);
        }

        /* DELETE BUTTON — appears on row hover */
        .task-cell {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-name {
            flex: 1;
            font-weight: 500;
        }

        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            border-radius: 6px;
            background: rgba(239,68,68,0.0);
            border: 1px solid transparent;
            color: transparent;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.18s ease;
            flex-shrink: 0;
            opacity: 0;
            transform: scale(0.75);
        }

        tbody tr:hover .delete-btn {
            opacity: 1;
            transform: scale(1);
            color: #f87171;
            background: rgba(239,68,68,0.10);
            border-color: rgba(239,68,68,0.28);
        }

        .delete-btn:hover {
            background: rgba(239,68,68,0.22) !important;
            border-color: rgba(239,68,68,0.55) !important;
            transform: scale(1.1) !important;
        }

        /* Fade-out animation when row is deleted */
        tbody tr.deleting {
            animation: rowFadeOut 0.35s ease forwards;
        }

        @keyframes rowFadeOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(18px); }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="brand">
        <span class="brand-icon">G</span>
        GrowIt
    </a>
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/category/STUDY" class="nav-link nav-study">Study</a>
    <a href="/category/HABIT" class="nav-link nav-habit">Habits</a>
    <a href="/analytics" class="nav-link nav-analytics">Analytics</a>
    <a href="/notes" class="nav-link nav-notes" id="nav-notes">Notes</a>

    <div class="theme-toggle">
        <button class="t-btn" id="btn-light" onclick="setTheme('light')">☀ Light</button>
        <button class="t-btn on"  id="btn-dark"  onclick="setTheme('dark')">◑ Dark</button>
    </div>
</nav>

<main>

    <h1 class="page-title">📊 Habit Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Habits</div>
            <div class="stat-value" th:text="${totalHabits}"></div>
        </div>
        <div class="stat-card sc-blue">
            <div class="stat-label">Completed Today</div>
            <div class="stat-value" th:text="${completedToday}"></div>
        </div>
        <div class="stat-card sc-green">
            <div class="stat-label">Consistency</div>
            <div class="stat-value">
                <span th:text="${#numbers.formatDecimal(percentage, 1, 2)}"></span>%
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Add New Habit</div>
        <form th:action="@{/add}" method="post">
            <div class="form-row">
                <input type="text" name="title" placeholder="Enter habit name…" required/>
                <select name="category" required>
                    <option value="STUDY">STUDY</option>
                    <option value="HABIT">HABIT</option>
                </select>
                <button type="submit" class="btn">+ Add Habit</button>
            </div>
        </form>
    </div>

    <div class="panel">
        <div class="panel-title">Daily Tracker</div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Task</th>
                    <th>Category</th>
                    <th th:each="day : ${days}" th:text="${day}"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="habit : ${habits}">
                    <td>
                        <div class="task-cell">
                            <span class="task-name" th:text="${habit.title}"></span>
                            <a class="delete-btn"
                               th:href="@{'/delete/' + ${habit.id}}"
                               th:attr="data-id=${habit.id}"
                               title="Delete habit"
                               onclick="confirmDelete(event, this)">✕</a>
                        </div>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${habit.category == 'STUDY'} ? 'badge-study' : 'badge-habit'"
                              th:text="${habit.category}">
                        </span>
                    </td>
                    <td th:each="day : ${days}"
                        th:classappend="${habit.completedDates.contains(#temporals.create(today.year, today.monthValue, day))} ? 'done-cell' : ''">
                        <a th:href="@{'/mark/' + ${habit.category} + '/' + ${habit.id}}"
                           th:if="${habit.completedDates.contains(#temporals.create(today.year, today.monthValue, day))}">✓</a>
                        <a th:href="@{'/mark/' + ${habit.category} + '/' + ${habit.id}}"
                           th:unless="${habit.completedDates.contains(#temporals.create(today.year, today.monthValue, day))}">&nbsp;</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script>
    (function() {
        const saved = localStorage.getItem('habitos-theme') || 'dark';
        applyTheme(saved);
    })();

    function setTheme(theme) {
        applyTheme(theme);
        localStorage.setItem('habitos-theme', theme);
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('btn-light').classList.toggle('on', theme === 'light');
        document.getElementById('btn-dark').classList.toggle('on',  theme === 'dark');
    }

    function confirmDelete(e, btn) {
        e.preventDefault();
        const row = btn.closest('tr');
        const name = row.querySelector('.task-name').textContent.trim();

        if (!confirm('Delete "' + name + '"?')) return;

        row.classList.add('deleting');
        setTimeout(() => {
            window.location.href = btn.getAttribute('href');
        }, 340);
    }
</script>
</body>
</html>
